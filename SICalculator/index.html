<html lang="en" data-bs-theme="light">

<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS v5.3.8 -->

<body>
    <div class="d-flex justify-content-center align-items-center" style="min-height: 100vh;">

            <h2 class="text-center my-2">Simple Intrest Calculator</h2>
            <input id="inp1" type="text" class="form-control mb-3" placeholder="enter principle amount">
            <input id="inp2" type="text" class="form-control mb-3" placeholder="enter intrest rate">
            <input id="inp3" type="text" class="form-control mb-3" placeholder="enter number of years">
            <div class="d-grid">
                <button onclick="SimpleIntrest()" class="btn btn-success">Calculate</button>

            <h2> Amount : <span id="result"></span></h2>
        </div>
